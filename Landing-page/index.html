<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Huddle</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer">
</head>
<body>

  <img src="./assets/bg-desktop.png" alt="" class="imagem-fundo">
  <header>
  <img src="./assets/logo.png" alt="">
  </header>
  <main>
      <div class="left">
          <img src="./assets/illustration-mockups.png" alt="">
      </div>
      <div class="right">
          <h1>Build The Community <br> Your Fans Will Love</h1>
          <p>Huddle re-imagines the way we build communities. You have <br>a voice, but so does
              your audience. Create connections with <br>your users as you engage in genuine discussion.
          </p>
          <button id="register">Register</button>
      </div>
  </main>
  <footer>
      <button class="btn-contato" id="facebook">
          <i class="fab fa-facebook"></i>
      </button>
      <button class="btn-contato" id="twitter">
          <i class="fab fa-twitter"></i>
      </button>
      <button class="btn-contato" id="instagram">
          <i class="fab fa-instagram"></i>
      </button>
  </footer>

    <script src="script.js"></script>
</body>
</html>
